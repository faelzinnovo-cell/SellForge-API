<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SellForge API - Painel Cliente</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: true,
      theme: {
        extend: {
          colors: {
            forge: {
              base: '#050512',
              card: '#0f0f26',
              primary: '#4f46e5',
              success: '#10b981',
              danger: '#ef4444',
              text: '#e5e7ff'
            }
          }
        }
      }
    }
  </script>
  <style>*{-webkit-tap-highlight-color:transparent;}</style>
</head>
<body class="bg-forge-base text-forge-text min-h-screen font-sans">
  <div class="max-w-md mx-auto p-5">
    <header class="text-center mb-6">
      <h1 class="text-2xl font-bold text-forge-primary">⚡ SellForge API</h1>
      <p class="text-sm opacity-80">Painel Cliente Oficial</p>
      <div id="statusSistema" class="mt-3 p-2 rounded bg-red-900/20 border text-sm">Verificando sistema...</div>
    </header>

    <!-- Escolher Plano e Alugar -->
    <div class="bg-forge-card rounded-xl p-5 mb-5 border border-indigo-800/30">
      <h2 class="text-lg font-semibold mb-4">📋 Alugar API</h2>
      <select id="planoEscolhido" class="w-full bg-forge-base border border-indigo-700 p-2 rounded mb-3">
        <option value="basico">Plano Básico - 500 req/dia</option>
        <option value="profissional">Plano Profissional - 2.500 req/dia</option>
        <option value="ultra">Plano Ultra - 10.000 req/dia</option>
      </select>
      <button onclick="alugarAPI()" id="btnAlugar" class="w-full bg-forge-primary py-2 rounded font-medium">Gerar Minha Chave</button>
      <div id="resultadoAluguel" class="mt-4 text-sm break-all"></div>
    </div>

    <!-- Minha Chave e Status -->
    <div class="bg-forge-card rounded-xl p-5 mb-5 border border-indigo-800/30">
      <h2 class="text-lg font-semibold mb-3">🔑 Minha Chave de Acesso</h2>
      <input type="text" id="minhaChave" placeholder="Sua chave aparecerá aqui" readonly class="w-full bg-forge-base border p-2 rounded mb-3">
      <button onclick="verificarStatus()" class="w-full bg-blue-600 py-2 rounded">Verificar Status</button>
      <div id="statusChave" class="mt-3 text-sm space-y-1"></div>
    </div>

    <!-- Ferramentas da API -->
    <div id="areaFerramentas" class="hidden">
      <div class="bg-forge-card rounded-xl p-5 mb-5 border border-indigo-800/30">
        <h2 class="text-lg font-semibold mb-3">📐 Calcular Sensibilidade</h2>
        <input type="number" id="dpi" placeholder="Ex: 449" class="w-full bg-forge-base border p-2 rounded mb-3">
        <button onclick="calcular()" class="w-full bg-forge-primary py-2 rounded">Calcular</button>
        <div id="resCalc" class="mt-3 text-sm"></div>
      </div>
      <div class="bg-forge-card rounded-xl p-5 border border-indigo-800/30">
        <h2 class="text-lg font-semibold mb-3">🎲 Gerar Sensibilidade</h2>
        <button onclick="gerar()" class="w-full bg-forge-primary py-2 rounded">Gerar Agora</button>
        <div id="resGerar" class="mt-3 text-sm"></div>
      </div>
    </div>
  </div>

  <script>
    const BASE = window.location.origin;
    const NOME_OFICIAL = "SellForge API - Painel Cliente";
    const statusEl = document.getElementById("statusSistema");

    async function verificarSistema() {
      try {
        const res = await fetch(`${BASE}/api/sellforge/gerar-sensibilidade?chave=teste`);
        statusEl.className = "p-2 rounded bg-green-900/20 border border-green-700/40 text-green-300";
        statusEl.textContent = "✅ Sistema Oficial Conectado";
      } catch {
        statusEl.className = "p-2 rounded bg-red-900/20 border border-red-700/40 text-forge-danger";
        statusEl.textContent = "❌ Sistema Inválido ou Alterado";
        document.body.innerHTML = `<div class="p-8 text-center text-red-400 text-xl">SOMENTE FUNCIONA: ${NOME_OFICIAL}</div>`;
      }
    }

    async function alugarAPI() {
      const plano = document.getElementById("planoEscolhido").value;
      const div = document.getElementById("resultadoAluguel");
      div.innerHTML = "Processando...";
      try {
        const res = await fetch(`${BASE}/api/sellforge/alugar`, {
          method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({plano})
        });
        const dados = await res.json();
        if (dados.sucesso) {
          div.innerHTML = `<p class="text-forge-success">✅ Chave Gerada!</p><p class="font-bold text-lg mt-2">${dados.dados.chave}</p>`;
          document.getElementById("minhaChave").value = dados.dados.chave;
          document.getElementById("areaFerramentas").classList.remove("hidden");
        } else div.innerHTML = `<p class="text-forge-danger">${dados.aviso}</p>`;
      } catch { div.innerHTML = `<p class="text-forge-danger">Erro no sistema</p>`; }
    }

    async function verificarStatus() {
      const chave = document.getElementById("minhaChave").value;
      const div = document.getElementById("statusChave");
      if (!chave) return div.innerHTML = "<p class='text-forge-danger'>Primeiro gere sua chave</p>";
      div.innerHTML = "Verificando...";
      try {
        const res = await fetch(`${BASE}/api/sellforge/meu-acesso?chave=${chave}`);
        const dados = await res.json();
        if (dados.ativo) {
          const d = dados.dados;
          div.innerHTML = `
            <p><strong>Plano:</strong> ${d.plano}</p>
            <p><strong>Válido até:</strong> ${new Date(d.dataValidade).toLocaleDateString()}</p>
            <p><strong>Usos:</strong> ${d.usosFeitos}/${d.limiteRequisicoes}</p>
          `;
        } else div.innerHTML = `<p class='text-forge-danger'>${dados.mensagem}</p>`;
      } catch { div.innerHTML = "<p class='text-forge-danger'>Sistema inválido</p>"; }
    }

    async function calcular() {
      const chave = document.getElementById("minhaChave").value;
      const dpi = document.getElementById("dpi").value;
      const div = document.getElementById("resCalc");
      if (!chave || !dpi) return div.innerHTML = "<p class='text-forge-danger'>Preencha tudo</p>";
      div.innerHTML = "Calculando...";
      try {
        const res = await fetch(`${BASE}/api/sellforge/calcular-sensibilidade`, {
          method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({chave, dpi})
        });
        const dados = await res.json();
        if (dados.sucesso) div.innerHTML = Object.entries(dados.configuracao).map(([c,v])=>`<p>${c.toUpperCase()}: <strong>${v}</strong></p>`).join("");
        else div.innerHTML = `<p class='text-forge-danger'>${dados.aviso}</p>`;
      } catch { div.innerHTML = "<p class='text-forge-danger'>Erro</p>"; }
    }

    async function gerar() {
      const chave = document.getElementById("minhaChave").value;
      const div = document.getElementById("resGerar");
      if (!chave) return div.innerHTML = "<p class='text-forge-danger'>Gere sua chave primeiro</p>";
      div.innerHTML = "Gerando...";
      try {
        const res = await fetch(`${BASE}/api/sellforge/gerar-sensibilidade?chave=${chave}`);
        const dados = await res.json();
        if (dados.sucesso) div.innerHTML = Object.entries(dados.configuracao).map(([c,v])=>`<p>${c.toUpperCase()}: <strong>${v}</strong></p>`).join("");
        else div.innerHTML = `<p class='text-forge-danger'>${dados.aviso}</p>`;
      } catch { div.innerHTML = "<p class='text-forge-danger'>Erro</p>"; }
    }

    verificarSistema();
  </script>
</body>
</html>
